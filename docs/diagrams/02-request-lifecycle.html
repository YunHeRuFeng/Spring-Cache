<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>请求生命周期流程图 - Local Cache Framework</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #e0e6f0;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    min-height: 100vh;
  }
  .container { width: 1000px; }
  h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  .subtitle {
    text-align: center;
    font-size: 14px;
    color: #64748b;
    margin-bottom: 48px;
    letter-spacing: 1px;
  }
  svg { width: 100%; height: auto; }
  .flow-bg { fill: rgba(255,255,255,0.02); stroke: rgba(255,255,255,0.06); stroke-width: 1; rx: 16; }
  /* node styles */
  .node-start    { fill: url(#gradStart); }
  .node-process  { fill: url(#gradProcess); }
  .node-decision { fill: url(#gradDecision); }
  .node-hit      { fill: url(#gradHit); }
  .node-miss     { fill: url(#gradMiss); }
  .node-expired  { fill: url(#gradExpired); }
  .node-db       { fill: url(#gradDB); }
  .node-end      { fill: url(#gradEnd); }
  .node-evict    { fill: url(#gradEvict); }

  .node-text {
    fill: #fff;
    font-size: 12px;
    font-weight: 600;
    text-anchor: middle;
    dominant-baseline: central;
  }
  .node-text-sm {
    fill: rgba(255,255,255,0.7);
    font-size: 9.5px;
    font-weight: 400;
    text-anchor: middle;
    dominant-baseline: central;
  }
  .label-text {
    fill: #94a3b8;
    font-size: 10px;
    font-weight: 600;
    text-anchor: middle;
  }
  .label-yes { fill: #34d399; font-size: 11px; font-weight: 700; }
  .label-no  { fill: #f87171; font-size: 11px; font-weight: 700; }
  .label-hit { fill: #60a5fa; font-size: 11px; font-weight: 700; }
  .label-miss { fill: #fb923c; font-size: 11px; font-weight: 700; }
  .label-exp  { fill: #fbbf24; font-size: 11px; font-weight: 700; }

  .arrow-line {
    stroke: rgba(148,163,184,0.5);
    stroke-width: 2;
    fill: none;
    marker-end: url(#arrowhead);
  }
  .arrow-hit  { stroke: #60a5fa; stroke-width: 2.5; }
  .arrow-miss { stroke: #fb923c; stroke-width: 2.5; }
  .arrow-exp  { stroke: #fbbf24; stroke-width: 2.5; }
  .arrow-yes  { stroke: #34d399; stroke-width: 2.5; }
  .arrow-no   { stroke: #f87171; stroke-width: 2.5; }

  .phase-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .stat-box {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 36px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 22px;
    text-align: center;
    min-width: 130px;
  }
  .stat-icon { font-size: 20px; margin-bottom: 4px; }
  .stat-label { font-size: 10px; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; }
  .stat-desc { font-size: 11px; color: #64748b; margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
  <h1>请求生命周期流程图</h1>
  <p class="subtitle">GET /api/cache/products/{id} — 从请求到响应的完整数据链路</p>

  <svg viewBox="0 0 900 920" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="gradStart" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#0ea5e9"/></linearGradient>
      <linearGradient id="gradProcess" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#6366f1"/></linearGradient>
      <linearGradient id="gradDecision" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
      <linearGradient id="gradHit" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#059669"/></linearGradient>
      <linearGradient id="gradMiss" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fb923c"/><stop offset="100%" stop-color="#ea580c"/></linearGradient>
      <linearGradient id="gradExpired" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
      <linearGradient id="gradDB" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f472b6"/><stop offset="100%" stop-color="#db2777"/></linearGradient>
      <linearGradient id="gradEnd" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#10b981"/></linearGradient>
      <linearGradient id="gradEvict" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f87171"/><stop offset="100%" stop-color="#dc2626"/></linearGradient>

      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" fill="#94a3b8"><polygon points="0 0, 8 3, 0 6"/></marker>
      <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" fill="#60a5fa"><polygon points="0 0, 8 3, 0 6"/></marker>
      <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" fill="#fb923c"><polygon points="0 0, 8 3, 0 6"/></marker>
      <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" fill="#fbbf24"><polygon points="0 0, 8 3, 0 6"/></marker>
      <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" fill="#34d399"><polygon points="0 0, 8 3, 0 6"/></marker>
      <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" fill="#f87171"><polygon points="0 0, 8 3, 0 6"/></marker>

      <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>

    <!-- Phase backgrounds -->
    <rect x="20" y="25" width="860" height="110" class="flow-bg" rx="16" opacity="0.5"/>
    <text x="50" y="50" class="phase-label" fill="#38bdf8">① 请求接入</text>

    <rect x="20" y="155" width="860" height="130" class="flow-bg" rx="16" opacity="0.5"/>
    <text x="50" y="180" class="phase-label" fill="#818cf8">② 缓存查找</text>

    <rect x="20" y="305" width="860" height="155" class="flow-bg" rx="16" opacity="0.5"/>
    <text x="50" y="330" class="phase-label" fill="#a78bfa">③ 结果分支</text>

    <rect x="20" y="480" width="860" height="260" class="flow-bg" rx="16" opacity="0.5"/>
    <text x="50" y="505" class="phase-label" fill="#f472b6">④ 回源与写入</text>

    <rect x="20" y="760" width="860" height="140" class="flow-bg" rx="16" opacity="0.5"/>
    <text x="50" y="785" class="phase-label" fill="#34d399">⑤ 响应返回</text>

    <!-- ========= NODES ========= -->

    <!-- 1. HTTP Request -->
    <rect x="350" y="62" width="200" height="50" rx="25" class="node-start" filter="url(#glow)"/>
    <text x="450" y="82" class="node-text">HTTP GET Request</text>
    <text x="450" y="97" class="node-text-sm">/api/cache/products/{id}</text>

    <!-- Arrow to Controller -->
    <line x1="450" y1="112" x2="450" y2="195" class="arrow-line"/>

    <!-- 2. Controller → Service -->
    <rect x="325" y="195" width="250" height="50" rx="12" class="node-process"/>
    <text x="450" y="214" class="node-text">CacheManagerService</text>
    <text x="450" y="230" class="node-text-sm">cache.lookup(key) — 获取锁</text>

    <!-- Arrow to Decision -->
    <line x1="450" y1="245" x2="450" y2="340" class="arrow-line"/>

    <!-- 3. Decision diamond: Cache 中有此 key? -->
    <polygon points="450,340 560,390 450,440 340,390" class="node-decision" filter="url(#glow)"/>
    <text x="450" y="385" class="node-text">存在且未过期?</text>
    <text x="450" y="400" class="node-text-sm">检查 storage + TTL</text>

    <!-- ===== HIT branch (left) ===== -->
    <line x1="340" y1="390" x2="160" y2="390" class="arrow-line arrow-hit" marker-end="url(#arrowBlue)"/>
    <text x="255" y="380" class="label-hit">HIT ✓</text>

    <rect x="60" y="365" width="100" height="50" rx="12" class="node-hit"/>
    <text x="110" y="385" class="node-text">缓存命中</text>
    <text x="110" y="400" class="node-text-sm">hitCount++</text>

    <!-- HIT → recordAccess -->
    <line x1="110" y1="415" x2="110" y2="530" class="arrow-line arrow-hit" marker-end="url(#arrowBlue)"/>
    <rect x="35" y="530" width="150" height="50" rx="12" class="node-process"/>
    <text x="110" y="550" class="node-text">recordAccess</text>
    <text x="110" y="565" class="node-text-sm">accessCount++ / onAccess</text>

    <!-- HIT → Response -->
    <line x1="110" y1="580" x2="110" y2="830" class="arrow-line arrow-hit" marker-end="url(#arrowBlue)"/>

    <!-- ===== MISS branch (right) ===== -->
    <line x1="560" y1="390" x2="730" y2="390" class="arrow-line arrow-miss" marker-end="url(#arrowOrange)"/>
    <text x="640" y="380" class="label-miss">MISS ✗</text>

    <rect x="730" y="365" width="120" height="50" rx="12" class="node-miss"/>
    <text x="790" y="385" class="node-text">缓存未命中</text>
    <text x="790" y="400" class="node-text-sm">missCount++</text>

    <!-- MISS → DB -->
    <line x1="790" y1="415" x2="790" y2="530" class="arrow-line arrow-miss" marker-end="url(#arrowOrange)"/>
    <rect x="700" y="530" width="180" height="50" rx="12" class="node-db" filter="url(#glow)"/>
    <text x="790" y="550" class="node-text">ProductRepository</text>
    <text x="790" y="565" class="node-text-sm">findById() — 模拟数据库</text>

    <!-- DB → put cache -->
    <line x1="790" y1="580" x2="790" y2="640" class="arrow-line arrow-miss" marker-end="url(#arrowOrange)"/>
    <rect x="700" y="640" width="180" height="50" rx="12" class="node-process"/>
    <text x="790" y="655" class="node-text">cache.put(key, val, ttl)</text>
    <text x="790" y="670" class="node-text-sm">写入缓存 + 通知策略</text>

    <!-- put → capacity check -->
    <line x1="700" y1="665" x2="530" y2="665" class="arrow-line"/>
    <polygon points="450,635 530,665 450,695 370,665" class="node-decision"/>
    <text x="450" y="660" class="node-text" font-size="11">容量已满?</text>
    <text x="450" y="675" class="node-text-sm">size ≥ capacity</text>

    <!-- capacity YES → evict -->
    <line x1="370" y1="665" x2="280" y2="665" class="arrow-line arrow-no" marker-end="url(#arrowRed)"/>
    <text x="330" y="655" class="label-yes">YES</text>
    <rect x="190" y="640" width="90" height="50" rx="12" class="node-evict"/>
    <text x="235" y="660" class="node-text">淘汰</text>
    <text x="235" y="675" class="node-text-sm">evictKey()</text>

    <!-- capacity NO → skip -->
    <line x1="450" y1="695" x2="450" y2="720" class="arrow-line arrow-yes" marker-end="url(#arrowGreen)"/>
    <text x="470" y="712" class="label-no" fill="#34d399">NO</text>

    <!-- put → response -->
    <line x1="790" y1="690" x2="790" y2="830" class="arrow-line arrow-miss" marker-end="url(#arrowOrange)"/>

    <!-- ===== EXPIRED branch (down) ===== -->
    <line x1="450" y1="440" x2="450" y2="520" class="arrow-line arrow-exp" marker-end="url(#arrowYellow)"/>
    <text x="475" y="470" class="label-exp">EXPIRED</text>

    <rect x="375" y="520" width="150" height="50" rx="12" class="node-expired"/>
    <text x="450" y="540" class="node-text">缓存已过期</text>
    <text x="450" y="555" class="node-text-sm">expiredCount++ / 移除旧条目</text>

    <!-- Expired → same as miss: go to DB  -->
    <path d="M525,545 L640,545 L640,555 L700,555" class="arrow-line arrow-exp" fill="none" marker-end="url(#arrowYellow)"/>
    <text x="620" y="535" class="node-text-sm" fill="#fbbf24">回源</text>

    <!-- ===== Response ===== -->
    <rect x="300" y="810" width="300" height="55" rx="27" class="node-end" filter="url(#glow)"/>
    <text x="450" y="832" class="node-text" font-size="14">返回 ProductQueryResult</text>
    <text x="450" y="850" class="node-text-sm">{ product, source: HIT | MISS | EXPIRED }</text>
  </svg>

  <!-- Stats at bottom -->
  <div class="stat-box">
    <div class="stat-card">
      <div class="stat-icon">🎯</div>
      <div class="stat-label">HIT</div>
      <div class="stat-desc">直接返回缓存<br>hitCount++</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">❌</div>
      <div class="stat-label">MISS</div>
      <div class="stat-desc">回源数据库<br>missCount++</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">⏰</div>
      <div class="stat-label">EXPIRED</div>
      <div class="stat-desc">TTL 到期，移除后回源<br>expiredCount++</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🗑️</div>
      <div class="stat-label">EVICTION</div>
      <div class="stat-desc">容量满时按策略淘汰<br>evictionCount++</div>
    </div>
  </div>
</div>
</body>
</html>
